name: strategy_v0

tradable_symbols:
  - EURUSD
  - GBPUSD
  - USDJPY
  - USDCHF
  - USDCAD
  - AUDUSD
  - EURGBP
  - XAUUSD
  - XAGUSD

hard_excluded_symbols:
  EURCHF: "standing rule: spread too high"
  BARUSD: "no historical data"
  BTCUSD: "no historical data"
  ETHUSD: "no historical data"
  SOLUSD: "no historical data"
  XRPUSD: "no historical data"

bar_interval_minutes: 15
broker_lot_step: "0.01"
lot_rounding_decimals: 2
min_training_samples: 32
destroyer_validation_sharpe_threshold: "0.0"
target_rank_center: "0.5"

predictor:
  ridge_alpha: "1.0"
  n_bootstraps: 3
  bootstrap_seeds: [42, 49, 61]

features:
  lagged_returns:
    - lag: 1
    - lag: 5
    - lag: 20
    - lag: 96
  volatility:
    - window: 20
    - window: 96
  cross_symbol:
    - method: predefined_correlated_pair_1
    - method: predefined_correlated_pair_2
    - method: gold_silver_ratio
  gold_silver_ratio_lag: 5
  time_of_day:
    is_london_session:
      start_hour_utc: 7
      end_hour_utc: 16
    is_ny_session:
      start_hour_utc: 12
      end_hour_utc: 21
    is_asia_session:
      start_hour_utc: 23
      end_hour_utc: 7
  bid_ask:
    current_spread_bps: true
    spread_rolling_mean_window: 20
    basis_points_multiplier: "10000"
  macro:
    dollar_index_proxy_return_lag: 5

correlated_symbols:
  EURUSD: [GBPUSD, USDCHF]
  GBPUSD: [EURUSD, EURGBP]
  USDJPY: [USDCHF, USDCAD]
  USDCHF: [EURUSD, EURGBP]
  USDCAD: [USDJPY, USDCHF]
  AUDUSD: [GBPUSD, USDCAD]
  EURGBP: [EURUSD, GBPUSD]
  XAUUSD: [XAGUSD, USDCHF]
  XAGUSD: [XAUUSD, USDCHF]

trader:
  sigma_floor: "0.001"
  sigmoid_scale: "1.5"
  top_n: 3
  bottom_n: 3
  sizing_table:
    - abs_signal_max: "0.2"
      exposure_pct: "0.0"
    - abs_signal_max: "0.4"
      exposure_pct: "1.0"
    - abs_signal_max: "0.6"
      exposure_pct: "2.5"
    - abs_signal_max: "0.8"
      exposure_pct: "5.0"
    - abs_signal_max: "1.01"
      exposure_pct: "10.0"

instrument_contract_size:
  EURUSD: "100000"
  GBPUSD: "100000"
  USDJPY: "100000"
  USDCHF: "100000"
  USDCAD: "100000"
  AUDUSD: "100000"
  EURGBP: "100000"
  XAUUSD: "100"
  XAGUSD: "5000"

portfolio:
  currency_threshold_pct: "20.0"
  metals_threshold_pct: "15.0"
  gross_leverage_threshold: "0.50"
  scaling_steps: 101

risk_gate:
  required_for_live: true
  production_mode_required: true
  reject_if_legacy_audusd_ticket_open: 46678
  emergency_flatten_margin_level_pct: "50.0"
